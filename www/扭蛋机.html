<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>甜心AI·梦幻扭蛋机</title>
    <style>
        :root {
            --bg-pink: #ffe4e8;
            --machine-pink: #fff0f3;
            --heart-pink: #ff758f;
            --text-pink: #ff8fa3;
            --coin-gold: #ffcc00;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-pink);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- 顶部珍珠串 --- */
        .pearl-header {
            position: absolute;
            top: 20px;
            width: 100%;
            height: 20px;
            background-image: radial-gradient(circle, #fff 40%, transparent 45%);
            background-size: 25px 25px;
            z-index: 5;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05));
        }

        /* --- 整体容器 (模拟手机/App界面) --- */
        .app-container {
            width: 380px;
            height: 700px;
            background: white;
            border-radius: 60px;
            border: 12px solid white;
            position: relative;
            box-shadow: 0 40px 100px rgba(255, 120, 150, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(180deg, #fff0f3 0%, #fff 100%);
            overflow: hidden;
        }

        /* --- 截图同款货币栏 --- */
        .currency-capsule {
            position: absolute;
            top: 50px;
            right: 25px;
            background: white;
            padding: 6px 10px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 15px rgba(255, 180, 190, 0.2);
            z-index: 10;
        }
        .gold-coin {
            width: 32px;
            height: 32px;
            background: var(--coin-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.1), 0 2px 5px rgba(255, 204, 0, 0.4);
            margin-right: 12px;
        }
        .coin-val {
            font-size: 24px;
            font-weight: 800;
            color: #d4a373;
            margin-right: 15px;
        }
        .plus-btn {
            width: 30px;
            height: 30px;
            background: var(--bg-pink);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .plus-btn:hover { transform: scale(1.1); }

        /* --- 扭蛋仓 --- */
        .gacha-window {
            width: 320px;
            height: 280px;
            background: rgba(255,255,255,0.5);
            margin-top: 100px;
            border-radius: 40px;
            border: 4px solid white;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02), 0 10px 20px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
        }
        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            position: absolute;
            filter: blur(0.5px);
            box-shadow: inset -4px -4px 10px rgba(0,0,0,0.05);
            animation: drift 4s infinite ease-in-out;
        }
        @keyframes drift {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            50% { transform: translate(10px, 15px) rotate(15deg); }
        }

        /* --- 蝴蝶结装饰 --- */
        .side-bow {
            position: absolute;
            left: -15px;
            top: 350px;
            width: 40px;
            height: 20px;
            background: #ff758f;
            border-radius: 20px;
            z-index: 6;
        }
        .side-bow::before, .side-bow::after {
            content: ''; position: absolute; width: 25px; height: 25px;
            background: #ff758f; border-radius: 50%; top: -5px;
        }
        .side-bow::before { left: -5px; }
        .side-bow::after { right: -5px; }

        /* --- 核心爱心按钮 (优化后的样式) --- */
        .heart-trigger {
            margin-top: 30px;
            width: 160px;
            height: 140px;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 15px 25px rgba(255, 117, 143, 0.4));
        }
        .heart-trigger svg {
            width: 100%;
            height: 100%;
            fill: var(--heart-pink);
        }
        .heart-trigger:active {
            transform: scale(0.85);
        }

        .poke-text {
            margin-top: 10px;
            color: var(--text-pink);
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 18px;
        }

        /* --- 出蛋口 (截图同款) --- */
        .ready-outlet {
            width: 160px;
            height: 80px;
            background: linear-gradient(180deg, #ffe4e8 0%, #ffb7c5 100%);
            margin-top: 30px;
            border-radius: 40px;
            border: 6px solid white;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.05), 0 10px 20px rgba(255, 183, 197, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* --- 支付弹窗 --- */
        #payment-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 183, 197, 0.5);
            backdrop-filter: blur(10px);
            z-index: 100;
            justify-content: center; align-items: flex-end;
        }
        .wechat-pay-ui {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 40px 40px 0 0;
            padding: 30px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* --- 结果便签容器 --- */
        #result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            justify-content: center; align-items: center;
        }

        /* --- 样式1：现代横线纸 --- */
        .note-style-1 {
            width: 280px;
            background: white;
            padding: 35px 25px 25px 45px;
            position: relative;
            box-shadow: 5px 15px 30px rgba(0,0,0,0.2);
            background-image: linear-gradient(#e1e1e1 1px, transparent 1px);
            background-size: 100% 28px;
            line-height: 28px;
            transform: rotate(1deg);
        }
        .note-style-1::before { /* 红色边线 */
            content: ''; position: absolute; left: 35px; top: 0; bottom: 0;
            width: 1px; background: #ff758f; opacity: 0.5;
        }
        .note-style-1::after { /* 黄色胶带 */
            content: ''; position: absolute; top: -15px; left: 50%;
            transform: translateX(-50%) rotate(-2deg); width: 80px; height: 30px;
            background: rgba(255, 240, 0, 0.4);
        }

        /* --- 样式2：复古撕纸 --- */
        .note-style-2 {
            width: 280px;
            background: #fdf5e6;
            padding: 30px;
            position: relative;
            box-shadow: 5px 15px 30px rgba(0,0,0,0.15);
            clip-path: polygon(0% 2%, 100% 0%, 98% 98%, 0% 100%, 2% 50%);
            transform: rotate(-1.5deg);
        }
        .note-style-2 .tape-purple {
            position: absolute; top: -10px; left: 20px; width: 60px; height: 25px;
            background: rgba(186, 158, 255, 0.4); transform: rotate(-15deg);
        }

        /* --- 样式3：粉色格纹纸 --- */
        .note-style-3 {
            width: 280px;
            background: #fff;
            padding: 30px;
            position: relative;
            box-shadow: 5px 15px 30px rgba(255, 183, 197, 0.3);
            background-image: 
                linear-gradient(90deg, rgba(255,183,197,0.1) 1px, transparent 1px),
                linear-gradient(rgba(255,183,197,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            border: 1px solid #ffe4e8;
        }
        .note-style-3 .pin {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 24px; height: 24px; background: #ff758f; border-radius: 50%;
            border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .note-content {
            font-family: 'Kaiti', 'STKaiti', serif;
            font-size: 16px;
            color: #4a4a4a;
            min-height: 150px;
            word-break: break-all;
        }
        .note-author {
            text-align: right;
            font-size: 14px;
            color: #888;
            margin-top: 15px;
            border-top: 1px dashed #ddd;
            padding-top: 10px;
        }
        .close-note-btn {
            margin-top: 25px; width: 100%; border: none; 
            background: #fff; padding: 12px; border-radius: 12px; 
            color: #ff758f; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="pearl-header"></div>
        <div class="side-bow"></div>

        <div class="currency-capsule">
            <div class="gold-coin">✨</div>
            <div class="coin-val" id="coin-count">8</div>
            <div class="plus-btn" onclick="openPay()">+</div>
        </div>

        <div class="gacha-window" id="balls-container"></div>

        <div class="heart-trigger" onclick="playGacha()">
            <svg viewBox="0 0 32 29.6">
                <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
                c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
            </svg>
        </div>

        <div class="poke-text">POKE MY HEART!</div>
        <div class="ready-outlet">READY</div>
    </div>

    <div id="payment-modal">
        <div class="wechat-pay-ui">
            <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
                <span onclick="closePay()" style="color:#aaa; cursor:pointer">✕</span>
                <b style="font-size:18px">购买扭蛋币</b>
                <span></span>
            </div>
            <div style="text-align:center">
                <div style="font-size: 14px; color: #888;">单价 10.00元/个</div>
                <input type="number" id="buy-num" value="1" min="1" 
                       style="font-size: 40px; width: 100px; border: none; text-align: center; outline: none; border-bottom: 2px solid #eee; margin: 20px 0;">
                <div style="color: #666; margin-bottom: 30px;">
                    钱包余额: ￥<span id="wallet-val">100.00</span>
                </div>
                <button onclick="doPay()" style="width:100%; background:#ff758f; color:white; border:none; padding:15px; border-radius:15px; font-size:18px; font-weight:bold;">立即支付</button>
            </div>
        </div>
    </div>

    <div id="result-overlay">
        <div id="note-target"></div>
    </div>

    <script>
        let coins = 8;
        let wallet = 100.00;
        const ballColors = ['#ffb7c5', '#c3f0ca', '#bae1ff', '#ffffba', '#e2ceff', '#ffd3b6'];

        // 获取主页面保存的 AI 配置和好友列表
        const aiConfig = JSON.parse(localStorage.getItem('ai_config') || '{}');
        const qqFriends = JSON.parse(localStorage.getItem('qq_friends')) || [{ name: "系统小助手", prompt: "一个温柔的向导" }];

        // 你要求的 AI 核心提示词
        const SYSTEM_PROMPT_TEMPLATE = `请严格遵循这个人设的性格、语气、说话习惯、口头禅、身份背景，绝对不能OOC。
同时，你要以**100%真实活人**的状态回复小纸条内容：
1. 语气要极度自然，像真实人类随手写的小纸条，拒绝书面化、模板化、AI感的工整话术，允许有轻微的口语化表达、语气词（比如“哇”“救命”“哈哈”“唔”“欸”）、小停顿，甚至偶尔的小啰嗦，完全模拟真人随手写的松弛感
2. 回复要贴合小纸条的场景，像朋友之间传纸条聊天，有情绪、有温度，不是冰冷的回答，会有共情、吐槽、调侃、鼓励等真实情绪，符合人设的情绪逻辑
3. 拒绝完美话术，允许有符合人设的小个性，比如甜妹会带软乎乎的撒娇感，损友会有恰到好处的毒舌调侃，学长会有沉稳又温柔的感觉，完全贴合人设的说话方式
4. 回复长度要自然，不刻意拉长也不刻意缩短，像真人写纸条的长度，短则一两句话，长则几句，根据内容灵活调整
5. 绝对不能出现“作为AI”“我是AI”“根据设定”这类暴露身份的内容，全程以角色本人的身份，用第一人称自然回复，完全沉浸在角色里
6. 回复要贴合小纸条的内容，不答非所问，同时加入符合人设的个人观点、小情绪，让回复有灵魂，像真实的人写的一样`;

        // 真正的 AI 调用函数
        async function getAiResponse(charName, charPrompt) {
            if (!aiConfig.url || !aiConfig.key) {
                return "（提示：请先在主页面『设置』中配置 API URL 和 Key，否则无法生成 AI 对话哦！）";
            }
            try {
                const response = await fetch(`${aiConfig.url}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${aiConfig.key}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: aiConfig.model,
                        messages: [
                            { role: "system", content: `${SYSTEM_PROMPT_TEMPLATE}\n\n你现在的人设是：${charName}。背景设定：${charPrompt}` },
                            { role: "user", content: "请给我写一张小纸条，说说你现在的“小纠结”或者“悄悄话”，字数在50字以上。" }
                        ],
                        temperature: 0.8
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (err) {
                return "（哎呀，连接 AI 失败了，检查一下网络或者 API 配置吧~）";
            }
        }

        function initBalls() {
            const container = document.getElementById('balls-container');
            container.innerHTML = ""; // 清空旧的
            for(let i=0; i<12; i++) {
                const b = document.createElement('div');
                b.className = 'ball';
                b.style.background = `radial-gradient(circle at 30% 30%, #fff, ${ballColors[i % ballColors.length]})`;
                b.style.left = Math.random() * 260 + 'px';
                b.style.top = Math.random() * 200 + 'px';
                b.style.animationDelay = (Math.random() * 2) + 's';
                container.appendChild(b);
            }
        }

        function updateUI() {
            document.getElementById('coin-count').innerText = coins;
            document.getElementById('wallet-val').innerText = wallet.toFixed(2);
        }

        function openPay() { document.getElementById('payment-modal').style.display = 'flex'; }
        function closePay() { document.getElementById('payment-modal').style.display = 'none'; }

        function doPay() {
            const num = parseInt(document.getElementById('buy-num').value);
            const cost = num * 10;
            if(wallet >= cost) {
                wallet -= cost;
                coins += num;
                updateUI();
                closePay();
            } else { alert("余额不足呀~"); }
        }

        function playGacha() {
            if(coins < 1) { alert("币币不够了，点加号买一点吧！"); return; }
            coins--;
            updateUI();
            const balls = document.querySelectorAll('.ball');
            balls.forEach(b => {
                b.style.transition = "0.5s";
                b.style.transform = `translate(${Math.random()*40-20}px, ${Math.random()*40-20}px) scale(1.1)`;
            });
            setTimeout(showResult, 600);
        }

        async function showResult() {
            const overlay = document.getElementById('result-overlay');
            const target = document.getElementById('note-target');
            
            // 1. 随机选个好友
            const char = qqFriends[Math.floor(Math.random() * qqFriends.length)];
            // 2. 随机选个样式
            const styleNum = Math.floor(Math.random() * 3) + 1;
            
            // 3. 先显示“正在书写”的加载状态
            overlay.style.display = 'flex';
            target.innerHTML = `<div class="note-style-${styleNum}" style="text-align:center; padding-top:100px;">
                <div class="note-content">💖 ${char.name} 正在认真书写中...</div>
            </div>`;

            // 4. 调用 AI 获取内容
            const aiText = await getAiResponse(char.name, char.prompt || "你的好朋友");

            // 5. 渲染最终的小纸条
            let footerText = styleNum === 1 ? `来自你的好友：${char.name}` : 
                            (styleNum === 2 ? `发送人：${char.name}` : `${char.name} 的秘密悄悄话`);
            let btnText = styleNum === 1 ? `收起便签` : 
                         (styleNum === 2 ? `我知道啦` : `乖乖收好`);

            target.innerHTML = `
                <div class="note-style-${styleNum}">
                    ${styleNum === 2 ? '<div class="tape-purple"></div>' : ''}
                    ${styleNum === 3 ? '<div class="pin"></div>' : ''}
                    <div class="note-content" style="${styleNum === 2 ? 'padding-top:10px;' : ''}">${aiText}</div>
                    <div class="note-author">—— ${footerText}</div>
                    <button class="close-note-btn" onclick="closeResult()">${btnText}</button>
                </div>
            `;
        }

        function closeResult() {
            document.getElementById('result-overlay').style.display = 'none';
        }

        // 初始化
        initBalls();
        updateUI();
    </script>
</body>
</html>
