<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋网模拟器 | 宠溺男神端</title>
    <style>
        :root {
            --main-pink: #ffb7c5;
            --dark-pink: #ff85a2;
            --soft-white: #fffafa;
            --text-gray: #7d5a5a;
            --accent-blue: #bfe6ff;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; outline: none; }
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffeef2 100%);
            color: var(--text-gray);
            overflow: hidden;
        }

        /* 全屏容器 */
        #app {
            display: flex; flex-direction: column; height: 100vh; width: 100vw;
            position: relative;
        }

        /* 顶部装饰栏 */
        .top-nav {
    display: flex; 
    justify-content: space-between; 
    /* 改为居中对齐，防止按钮太靠顶 */
    align-items: center;
    /* 增加顶部的内边距，确保避开手机的时间、电量显示区域 */
    padding: calc(env(safe-area-inset-top) + 15px) 10px 10px 10px; 
    /* 将高度调大到 90px，给按钮留出足够空间 */
    height: calc(90px + env(safe-area-inset-top));
    box-sizing: border-box;
    background: var(--glass);
    backdrop-filter: blur(10px); 
    z-index: 10;
    box-shadow: 0 4px 15px rgba(255, 183, 197, 0.2);
}

        .target-info { font-weight: bold; color: var(--dark-pink); font-size: 1.1em; }

        /* 按钮样式 */
        .btn-circle {
            background: white; border: 2px solid var(--main-pink);
            border-radius: 50px; padding: 6px 18px; color: var(--dark-pink);
            cursor: pointer; transition: 0.3s; font-size: 14px;
        }
        .btn-circle:hover { background: var(--main-pink); color: white; transform: translateY(-2px); }
        .btn-primary {
            background: var(--dark-pink); color: white; border: none;
            padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }

        /* 内容区 */
        .main-view {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 120px; /* 为底部输入框留空 */
        }

        /* 剧情文本框 */
        .story-card {
            background: var(--glass); width: 95%; max-width: 1000px;
            padding: 40px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 183, 197, 0.1);
            line-height: 2.0; font-size: 16px; margin-bottom: 25px;
            border: 2px solid white; animation: fadeIn 0.8s ease;
            white-space: pre-wrap;
        }

        /* 选项区 */
        .options-wrapper { width: 95%; max-width: 1000px; }
        .option-toggle {
            text-align: center; margin-bottom: 10px; color: var(--dark-pink);
            cursor: pointer; font-size: 14px; text-decoration: underline;
        }
        .option-item {
            background: white; border: 1.5px solid var(--main-pink);
            padding: 15px 20px; border-radius: 15px; margin-bottom: 12px;
            cursor: pointer; transition: 0.3s; color: var(--text-gray);
        }
        .option-item:hover { background: #fff0f3; border-color: var(--dark-pink); padding-left: 30px; }

        /* 物品页面 */
        .inventory-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; width: 90%; max-width: 800px;
        }
        .item-box {
            background: white; padding: 15px; border-radius: 20px;
            text-align: center; border: 1px solid #ffe0e5;
        }
        .item-box button { margin-top: 10px; font-size: 12px; }

        /* 底部浮动栏 */
        .bottom-float {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; display: flex; flex-direction: column; gap: 10px;
        }
        .input-bar {
            display: flex; background: var(--glass); backdrop-filter: blur(10px);
            padding: 8px; border-radius: 30px; border: 2px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .input-bar input {
            flex: 1; border: none; background: transparent; padding: 0 15px; font-size: 14px;
        }
        .tab-bar {
            display: flex; background: white; border-radius: 30px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .tab-item {
            flex: 1; text-align: center; padding: 12px; font-size: 15px; cursor: pointer; color: #a0a0a0;
        }
        .tab-item.active { background: var(--dark-pink); color: white; font-weight: bold; }

        /* 设置弹窗 */
        .modal {
            position: fixed; inset: 0; background: rgba(255,183,197,0.4);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 30px; width: 85%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .modal-content input, .modal-content select {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px;
        }

        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app">
    <!-- 顶部导航 -->
    <div class="top-nav">
        <button class="btn-circle" onclick="toggleSettings()">⚙️ 档案设置</button>
        <div class="target-info" id="target-display">点击“新的一天”开始</div>
        <button class="btn-primary" onclick="startNewDay()">✨ 开始新的一天</button>
    </div>

    <!-- 事件页面 -->
    <div id="event-page" class="main-view">
        <div class="story-card" id="story-text">
            欢迎来到恋网模拟器。<br>
            在这里，你将开启一段被极致偏爱的浪漫之旅。<br>
            请先点击左上角配置 API 密钥，然后开启属于你的邂逅吧。
        </div>
        
        <div class="options-wrapper">
            <div class="option-toggle" onclick="toggleOptions()">收起/展开选项</div>
            <div id="options-list"></div>
        </div>
    </div>

    <!-- 物品页面 -->
    <div id="item-page" class="main-view hidden">
        <h2 style="color: var(--dark-pink);">我的收藏</h2>
        <div class="inventory-grid" id="inventory-list">
            <!-- 物品占位 -->
        </div>
    </div>

    <!-- 底部控制区 -->
    <div class="bottom-float">
        <div class="input-bar" id="input-container">
            <input type="text" id="user-input" placeholder="输入你想说的话...">
            <button class="btn-primary" onclick="sendCustomAction()">发送</button>
        </div>
        <div class="tab-bar">
            <div class="tab-item active" id="tab-event" onclick="switchTab('event')">🌸 遇见</div>
            <div class="tab-item" id="tab-item" onclick="switchTab('item')">🎁 礼物</div>
        </div>
    </div>
</div>

<!-- 设置弹窗 -->
<div id="settings-modal" class="modal hidden">
    <div class="modal-content">
        <h3 style="text-align:center; color: var(--dark-pink);">系统配置</h3>
        <input type="text" id="api-url" placeholder="API 地址 (OpenAI 格式)">
        <input type="password" id="api-key" placeholder="API Key">
        <button class="btn-circle" style="width:100%" onclick="fetchModels()">1. 获取可用模型</button>
        <select id="model-select"><option value="">等待获取...</option></select>
        <hr style="border: 0.5px solid #f0f0f0; margin: 15px 0;">
        <button class="btn-circle" style="width:100%; margin-bottom: 10px;" onclick="loadFriends()">📥 导入 qq.html 好友</button>
        <div id="friend-status" style="font-size:12px; text-align:center; margin-bottom:15px;">当前好友库：内置测试角色</div>
        <button class="btn-primary" style="width:100%" onclick="saveSettings()">完成配置</button>
<!-- 选择好友赠送弹窗 -->
<div id="gift-modal" class="modal hidden">
    <div class="modal-content">
        <h3 style="text-align:center; color: var(--dark-pink);">送给谁呢？</h3>
        <div id="gift-friend-list" style="max-height: 300px; overflow-y: auto;">
            <!-- 这里会动态生成好友列表 -->
        </div>
        <button class="btn-primary" style="width:100%; margin-top:15px;" onclick="closeGiftModal()">取消</button>
    </div>
</div>

<!-- 新增：选择网恋对象弹窗 -->
<div id="target-selector-modal" class="modal hidden">
    <div class="modal-content">
        <h3 style="text-align:center; color: var(--dark-pink);">你想和谁网恋？</h3>
        <div id="target-list-container" style="max-height: 300px; overflow-y: auto;">
            <!-- 这里会动态显示你的 QQ 好友名字 -->
        </div>
        <button class="btn-primary" style="width:100%; margin-top:15px; background:#ccc;" onclick="document.getElementById('target-selector-modal').classList.add('hidden')">返回</button>
    </div>
</div>
    </div>
</div>

<script>
    // --- 初始数据 ---
let state = {
    config: { url: '', key: '', model: '' },
    friends: ["陆修远 (温柔腹黑大神)", "沈星回 (电竞天才学弟)", "顾子熹 (阳光宠溺邻家哥哥)"],
    currentTarget: null, // 初始设为空，由加载逻辑决定
    inventory: [],
    history: [],
    day: 0,
    relationStage: '陌生人 (刚在竞技场匹配到)',
    favorability: 0,
    isOptionsVisible: true
};

// 新增：保存当前角色的进度到本地
function saveAllProgress() {
    if (!state.currentTarget) return;
    
    // 获取所有角色的存档库，如果没有则创建一个空对象
    let allSaves = JSON.parse(localStorage.getItem('game_saves') || '{}');
    
    // 把当前角色的数据打包
    allSaves[state.currentTarget] = {
        history: state.history,
        day: state.day,
        relationStage: state.relationStage,
        favorability: state.favorability,
        lastStoryHtml: document.getElementById('story-text').innerHTML,
        lastOptionsHtml: document.getElementById('options-list').innerHTML,
        inventory: state.inventory
    };
    
    // 存回本地
    localStorage.setItem('game_saves', JSON.stringify(allSaves));
    // 同时记录最后一次在跟谁玩
    localStorage.setItem('last_target', state.currentTarget);
}

// 新增：读取某个角色的进度
function loadCharacterProgress(name) {
    let allSaves = JSON.parse(localStorage.getItem('game_saves') || '{}');
    let saveData = allSaves[name];
    
    if (saveData) {
        state.history = saveData.history || [];
        state.day = saveData.day || 0;
        state.relationStage = saveData.relationStage || '陌生人';
        state.favorability = saveData.favorability || 0;
        state.inventory = saveData.inventory || [];
        state.currentTarget = name;
        
        // 恢复页面上的文字和按钮
        document.getElementById('story-text').innerHTML = saveData.lastStoryHtml || '欢迎回来。';
        document.getElementById('options-list').innerHTML = saveData.lastOptionsHtml || '';
        document.getElementById('target-display').textContent = `❤️ 与 ${name} 的第 ${state.day} 天`;
        
        // 重新渲染背包内容
        renderInventory();
        return true;
    }
    return false;
}

    // --- 初始化 ---
window.onload = () => {
    // 加载 API 配置 (同步主页面设置)
    const savedConfig = localStorage.getItem('ai_config');
    if (savedConfig) {
        state.config = JSON.parse(savedConfig);
        document.getElementById('api-url').value = state.config.url || "";
        document.getElementById('api-key').value = state.config.key || "";
        // 自动选择主页面选好的模型
        const select = document.getElementById('model-select');
        select.innerHTML = `<option value="${state.config.model}">${state.config.model}</option>`;
    }

    // 自动从 QQ 获取好友
    loadFriends();

    // 尝试加载上一次玩的对象
    const lastTarget = localStorage.getItem('last_target');
    if (lastTarget) {
        loadCharacterProgress(lastTarget);
    }
    renderInventory();
};

    // --- UI 控制 ---
    function switchTab(tab) {
        document.getElementById('event-page').classList.toggle('hidden', tab !== 'event');
        document.getElementById('item-page').classList.toggle('hidden', tab !== 'item');
        document.getElementById('input-container').classList.toggle('hidden', tab !== 'event');
        document.getElementById('tab-event').classList.toggle('active', tab === 'event');
        document.getElementById('tab-item').classList.toggle('active', tab === 'item');
    }

    function toggleSettings() {
        document.getElementById('settings-modal').classList.toggle('hidden');
    }

    function toggleOptions() {
        state.isOptionsVisible = !state.isOptionsVisible;
        document.getElementById('options-list').classList.toggle('hidden', !state.isOptionsVisible);
    }

    // --- API & 数据 ---
    async function fetchModels() {
        const url = document.getElementById('api-url').value;
        const key = document.getElementById('api-key').value;
        try {
            const resp = await fetch(`${url}/models`, { headers: { 'Authorization': `Bearer ${key}` } });
            const data = await resp.json();
            const select = document.getElementById('model-select');
            select.innerHTML = '';
            data.data.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id; opt.textContent = m.id;
                select.appendChild(opt);
            });
        } catch (e) { alert('获取失败，请检查地址和 Key'); }
    }

    function saveSettings() {
    state.config.url = document.getElementById('api-url').value;
    state.config.key = document.getElementById('api-key').value;
    state.config.model = document.getElementById('model-select').value;
    // 保存到主页面通用的配置里
    localStorage.setItem('ai_config', JSON.stringify(state.config));
    toggleSettings();
}

    async function loadFriends() {
    // 直接从本地存储读取 QQ 的好友列表
    const qqFriendsData = JSON.parse(localStorage.getItem('qq_friends') || '[]');
    
    if(qqFriendsData.length > 0) {
        // 只提取名字
        state.friends = qqFriendsData.map(f => f.name);
        document.getElementById('friend-status').textContent = `已同步 QQ 好友：${state.friends.length} 位`;
    } else {
        document.getElementById('friend-status').textContent = `QQ 暂无好友，请先去 QQ 添加`;
    }
}

    // --- 核心逻辑 ---
        async function callAI(prompt) {
    if (!state.config.key) { toggleSettings(); return null; }
    
    document.getElementById('story-text').innerHTML = `<div style="color:var(--dark-pink); text-align:center;">（${state.currentTarget} 正在认真思索，指尖轻敲键盘给你回信中...）</div>`;
    
    const inventoryList = state.inventory.map(i => i.name).join('、') || '空';

    const systemMsg = {
        role: 'system',
        content: `【设定】你是一位擅长描写极致浪漫、细腻情感的深情小说作家。
        【当前对象】${state.currentTarget}。
        【当前关系】${state.relationStage}。
        【背包物品】玩家目前拥有的物品：${inventoryList}。
        
        【写作要求】
        1. 沉浸式叙事：请像连载小说一样，通过细腻的心理活动、环境氛围渲染（如：屏幕微光、连麦时轻微的呼吸声、窗外的夜色）、动作细节来推进剧情。
        2. 极致宠溺：${state.currentTarget} 对用户有着无法掩饰的偏爱，言语间温柔至极，即使是打游戏时的指挥也充满了保护欲。
        3. 文本量：生成约 1000-1500 字的高质量小说剧情。严禁使用任何括号，严禁输出 #、* 等 Markdown 符号。
        4. 背包互动：请观察【背包物品】，如果剧情合适，必须在选项中引导玩家使用或赠送包里的物品。
        5. 随机奖励：如果剧情中提到他送了你东西，请在文末加上 [获得物品: 物品名]。
        6. 选项规范：正文结束后，另起一行提供4个互动选项，格式为：[选项1]内容|[选项2]内容|[选项3]内容|[选项4]内容。`
    };

    try {
        const resp = await fetch(`${state.config.url}/chat/completions`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${state.config.key}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: state.config.model,
                messages: [systemMsg, ...state.history, { role: 'user', content: prompt }]
            })
        });
        const data = await resp.json();
        return data.choices[0].message.content;
    } catch (e) { return "（连麦频道里传来一阵杂音，他似乎正焦急地寻找信号，请检查设置。错误：" + e + "）"; }
}

    async function startNewDay() {
    const listContainer = document.getElementById('target-list-container');
    listContainer.innerHTML = ''; // 清空旧列表

    if (state.friends.length === 0) {
        alert("QQ里还没有好友哦，快去QQ添加几个帅哥吧！");
        return;
    }

    state.friends.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'option-item';
        btn.style.width = '100%';
        btn.style.textAlign = 'center';
        btn.textContent = name;
        btn.onclick = () => selectAndStartLove(name);
        listContainer.appendChild(btn);
    });
    
    document.getElementById('target-selector-modal').classList.remove('hidden');
}

// 新增：选中角色后的启动逻辑
async function selectAndStartLove(nextTarget) {
    document.getElementById('target-selector-modal').classList.add('hidden');
    
    // 尝试加载存档
    let hasSave = loadCharacterProgress(nextTarget);
    
    if (!hasSave) {
        // 如果没有存档，才开启全新的故事
        state.currentTarget = nextTarget;
        state.day = 1;
        state.history = [];
        state.relationStage = '陌生人 (刚在竞技场匹配到)';
        document.getElementById('target-display').textContent = `❤️ 与 ${state.currentTarget} 的第 ${state.day} 天`;
        
        const content = await callAI("开始新的一天，我们在游戏的连麦频道里相遇了，他正在等我。");
        if(content) displayStory(content);
    } else {
        alert('已恢复与 ' + nextTarget + ' 的甜蜜进度');
    }
}

        function displayStory(text) {
    // 1. 提取物品 (使用全局搜索 /g，防止 AI 一次性给多个物品)
    const itemRegex = /\[获得物品[:：]\s*(.+?)\]/g;
    let itemMatch;
    while ((itemMatch = itemRegex.exec(text)) !== null) {
        addItem(itemMatch[1].trim());
    }

    // 2. 解析选项 (优化匹配规则，使其兼容换行和空格)
    const options = [];
    const optRegex = /\[选项\d\]\s*([^|\[\]\n]+)/g;
    let m;
    while ((m = optRegex.exec(text)) !== null) {
        const optContent = m[1].trim();
        if (optContent) options.push(optContent);
    }

    // 3. 深度清理正文
    let cleanText = text;
    
    // 先把选项和物品标签从展示的正文中彻底拿掉
    cleanText = cleanText.replace(/\[选项\d\].*?(\||\n|$)/g, ''); 
    cleanText = cleanText.replace(/\[获得物品[:：].*?\]/g, '');
    
    // 移除标题、星号、井号
    cleanText = cleanText.replace(/\[剧情正文\]|\[正文\]|\[内容\]|\[奖励\]/g, '');
    cleanText = cleanText.replace(/[\*#]/g, '');
    cleanText = cleanText.trim();
    
    // 4. 显示纯净文本
    document.getElementById('story-text').innerHTML = cleanText.replace(/\n/g, '<br>');
    
    // 5. 渲染选项按钮
    const list = document.getElementById('options-list');
    list.innerHTML = '';
    
    // 如果 AI 没给选项，我们保底给一个“继续”按钮，防止卡死
    if (options.length === 0) {
        options.push("继续...");
    }

    options.forEach(opt => {
        const div = document.createElement('div');
        div.className = 'option-item';
        div.textContent = opt.replace(/[\*#]/g, ''); // 按钮文字也要干干净净
        div.onclick = () => handleAction(opt);
        list.appendChild(div);
    });

    // 自动滚动到顶部，方便阅读长文
    document.getElementById('event-page').scrollTo({ top: 0, behavior: 'smooth' });

    // 存入历史
    state.history.push({ role: 'assistant', content: text });
    if(state.history.length > 8) state.history.shift();
    
    // 新增：每次更新故事后立即保存到本地
    saveAllProgress();
}

    async function handleAction(act) {
        const content = await callAI(`玩家选择了：${act}。请根据这个选择继续生成1500字的宠溺后续。`);
        if(content) displayStory(content);
    }

    async function sendCustomAction() {
        const input = document.getElementById('user-input');
        if(!input.value) return;
        const val = input.value;
        input.value = '';
        const content = await callAI(`玩家自定义行动：${val}。请根据这个行动，以 ${state.currentTarget} 的视角生成1500字极其温柔宠溺的回应。`);
        if(content) displayStory(content);
    }

    // --- 物品系统 ---
    function addItem(name) {
        state.inventory.push({ id: Date.now(), name: name });
        renderInventory();
    }

    // 渲染背包列表
function renderInventory() {
    const list = document.getElementById('inventory-list');
    list.innerHTML = state.inventory.length === 0 ? '<p style="text-align:center; width:100%">背包空空的呢...</p>' : '';
    state.inventory.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item-box';
        div.innerHTML = `
            <div style="font-size:24px;">🎁</div>
            <div style="font-weight:bold; margin:5px 0;">${item.name}</div>
            <button class="btn-circle" onclick="handleUseItem(${item.id})">使用</button>
            <button class="btn-circle" onclick="openGiftModal(${item.id})">赠送</button>
        `;
        list.appendChild(div);
    });
}

// 处理“使用”物品
async function handleUseItem(id) {
    const item = state.inventory.find(i => i.id === id);
    state.inventory = state.inventory.filter(i => i.id !== id);
    renderInventory();
    saveAllProgress(); // 记得保存进度
    const content = await callAI(`玩家在当前场景使用了物品：${item.name}。请根据这个动作生成深情的互动剧情。`);
    switchTab('event');
    if(content) displayStory(content);
}

// 全局变量，记录当前要送的是哪一个物品
let currentGiftingItemId = null;

// 点击“赠送”按钮时触发
function openGiftModal(itemId) {
    currentGiftingItemId = itemId;
    const listContainer = document.getElementById('gift-friend-list');
    listContainer.innerHTML = ''; // 先清空

    // 关键点：如果还没同步过 QQ 好友，先尝试重新同步一次
    if (state.friends.length === 0) {
        loadFriends();
    }

    if (state.friends.length === 0) {
        alert("你的 QQ 里似乎还没有好友可以送礼哦。");
        return;
    }

    // 循环生成所有好友的按钮
    state.friends.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'option-item';
        btn.style.cssText = 'width:100%; text-align:center; padding:12px; margin-bottom:10px; cursor:pointer;';
        btn.textContent = "送给 " + name;
        btn.onclick = () => executeGift(name);
        listContainer.appendChild(btn);
    });

    document.getElementById('gift-modal').classList.remove('hidden');
}

function closeGiftModal() {
    document.getElementById('gift-modal').classList.add('hidden');
}

// 选中某个好友后执行赠送
async function executeGift(friendName) {
    // 找到这个物品的数据
    const item = state.inventory.find(i => i.id === currentGiftingItemId);
    if (!item) return;

    // 1. 把它从你的背包里拿走
    state.inventory = state.inventory.filter(i => i.id !== currentGiftingItemId);
    renderInventory(); // 刷新背包显示
    closeGiftModal(); // 关闭好友列表

    // 2. 核心逻辑：自动切换到这个人的对话线
    if (state.currentTarget !== friendName) {
        const hasProgress = loadCharacterProgress(friendName);
        if(!hasProgress) {
            state.currentTarget = friendName;
            state.day = 1;
            state.history = [];
            state.relationStage = '陌生人 (刚在竞技场匹配到)';
        }
    }

    // 3. 立即去请求 AI 生成一段他收到礼物的深情对白
    switchTab('event'); // 跳回故事页面
    const content = await callAI(`玩家跨越屏幕送给了 ${friendName} 一个惊喜礼物：【${item.name}】。请描写他在摄像头另一端或连麦中看到礼物时的神态变化、由于感动而变得沙哑的嗓音，以及他如何温柔地对玩家表达谢意并承诺回馈更多爱意的长篇互动。`);
    
    if(content) displayStory(content);
    saveAllProgress(); // 保存最新的记忆
}
</script>
